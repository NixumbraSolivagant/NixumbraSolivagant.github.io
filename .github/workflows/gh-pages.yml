name: Deploy Vite site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personal-web/package-lock.json

      - name: Install dependencies
        working-directory: ./personal-web
        run: npm ci

      - name: Build
        working-directory: ./personal-web
        run: npm run build
        env:
          VITE_UMAMI_BASE: ${{ vars.VITE_UMAMI_BASE }}
          VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}
          VITE_UMAMI_API_KEY: ${{ secrets.VITE_UMAMI_API_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./personal-web/dist
          publish_branch: gh-pages
